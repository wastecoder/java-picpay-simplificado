services:
  postgres:
    image: postgres:16-alpine
    container_name: picpay_postgres
    environment:
      POSTGRES_DB: picpay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - picpay-postgres-volume:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  picpay-postgres-volume:
