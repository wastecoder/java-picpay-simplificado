spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/picpay}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: validate    # Flyway = validate or none

    flyway:
      enabled: true
      locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_GENERATOR_SIGNATURE_SECRET:secretJWTGenerator}
    expires-after: 600
    issuer: ${APP_JWT_ISSUER:PICPAY-CHALLENGE}

client:
  transfer:
    validator-url: ${CLIENT_TRANSFER_VALIDATOR:https://run.mocky.io/v3/8fafdd68-a090-496f-8c9a-3442cf30dae6}
  notify:
    sender-url: ${CLIENT_NOTIFY_SENDER:http://o4d9z.mocklab.io/notify}
